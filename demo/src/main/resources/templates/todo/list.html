<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <a class="btn btn-primary" th:href="@{/todo/new}">新規登録</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show auto-dismiss" role="alert">
        <span th:text="${successMessage}">操作が完了しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show auto-dismiss" role="alert">
        <span th:text="${errorMessage}">操作に失敗しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${#lists.isEmpty(todos)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-3">ToDoがまだ登録されていません</h2>
            <p class="text-secondary mb-4">最初のToDoを作成して、タスク管理を始めましょう。</p>
            <a class="btn btn-outline-primary" th:href="@{/todo/new}">新規作成</a>
        </div>
    </div>

    <div th:unless="${#lists.isEmpty(todos)}" class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th scope="col">ID</th>
                <th scope="col">タイトル</th>
                <th scope="col">完了状態</th>
                <th scope="col">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="todo : ${todos}">
                <td th:text="${todo.id}">1</td>
                <td>
                    <span th:text="${todo.title}" th:style="${todo.completed} ? 'text-decoration: line-through;' : ''">サンプルタスク</span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${todo.completed} ? ' text-bg-success' : ' text-bg-secondary'"
                          th:text="${todo.completed} ? '完了' : '未完了'">未完了</span>
                </td>
                <td>
                    <div class="d-flex gap-2">
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/todo/{id}/edit(id=${todo.id})}">編集</a>

                        <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-success btn-sm"
                                    th:text="${todo.completed} ? '未完了に戻す' : '完了にする'">完了にする</button>
                        </form>

                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('本当に削除しますか？');">
                            <button type="submit" class="btn btn-danger btn-sm">削除</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    setTimeout(() => {
        document.querySelectorAll('.auto-dismiss').forEach((el) => {
            const alert = bootstrap.Alert.getOrCreateInstance(el);
            alert.close();
        });
    }, 3000);
</script>
</body>
</html>
